ai_usage_summary: |
  Used OpenCode with DeepSeek for architecture discussion, code drafting,
  refactoring, and debugging assistance. Used Perplexity for spec review,
  submission guidance, and workflow planning. The ranking pipeline itself runs
  fully locally on CPU with no external API calls or network access during
  ranking.

methodology_summary: |
  Hybrid candidate ranker combining skill-depth scoring, role and seniority
  fit, company-background filters, location and work-mode alignment,
  behavioral-signal scoring, TF-IDF semantic similarity, and consistency-based
  honeypot penalties. Candidates are ranked with deterministic tie-breaking
  and explicit reasoning generation tied to observed profile facts. Runtime is
  about 100 seconds for 100K candidates on a local CPU-only machine.

