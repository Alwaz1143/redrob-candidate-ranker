# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "OpenCode"
  - "DeepSeek"
  - "Perplexity"

ai_usage_summary: |
  OpenCode (driving agent) used for architecture design, code generation,
  debugging assistance, and documentation. DeepSeek (model behind OpenCode)
  used for code reasoning and drafting. Microsoft Copilot used for inline
  autocomplete during manual edits. No candidate data was ever sent to any
  external API — the ranking pipeline runs entirely locally with no network
  calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based ranker with explicit per-candidate reasoning. Seven scoring
  components (skill depth weighted by proficiency/duration/endorsements,
  role+seniority fit, company background with consulting-firm penalty,
  location/work-mode alignment, behavioral composite from 23 platform
  signals, TF-IDF semantic similarity, and honeypot/consistency penalties)
  combined via a weighted formula with a behavioral modifier. Skill-depth
  weighting with endorsement+duration trust multipliers catches keyword
  stuffers; generic-summary and title-desc mismatch detection catches
  honeypot profiles. Runtime ~100 seconds for 100K candidates on CPU.

